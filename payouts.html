<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payouts - March Madness</title>
    <link href="https://maxcdn.bootstrapcdn.com/font-awesome/4.2.0/css/font-awesome.min.css" rel="stylesheet">
    <link href='https://fonts.googleapis.com/css?family=Holtwood+One+SC|Kaushan+Script|Abel|Roboto+Condensed:700' rel='stylesheet'>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <header class="hero">
        <div class="hero-wrap">
            <p class="intro">Interactive</p>
            <h1>March Madness</h1>
            <p class="year"><i class="fa fa-star"></i> Bracket Challenge <i class="fa fa-star"></i></p>
        </div>
    </header>

    <nav id="mainNav">
        <a href="index.html">Submit Bracket</a> | 
        <a href="leaderboard.html">Leaderboard</a> | 
        <a href="payouts.html" style="font-weight: bold; color: #ff6200;">Payouts</a> | 
        <a href="rules.html">Rules & Payments</a> | 
        <a href="admin.html" class="subtle">Admin</a>
    </nav>

    <div class="container my-4">
        <h1 class="text-center text-primary">March Madness Payouts</h1>
        <p class="text-center" id="loadingMessage">Loading payout information...</p>
        
        <table class="table table-striped mt-4" id="payoutsTable" style="display:none;">
            <thead>
                <tr>
                    <th>Place</th>
                    <th>Winner</th>
                    <th>Amount</th>
                    <th>Notes</th>
                </tr>
            </thead>
            <tbody id="payouts-body"></tbody>
        </table>
    </div>

    <footer class="site-footer">
        <div class="footer-content">
            <p><i class="fa fa-envelope"></i> Contact: <a href="mailto:ncaahoopsmadness@gmail.com">ncaahoopsmadness@gmail.com</a></p>
            <p style="margin-top: 10px; font-size: 0.9em; opacity: 0.8;">&copy; 2025 March Madness Bracket Challenge. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB27qEP0k2PR8Zz_z_A8KjGcXvxX9OROQA",
            authDomain: "marchmadness2025-24f04.firebaseapp.com",
            projectId: "marchmadness2025-24f04",
            storageBucket: "marchmadness2025-24f04.firebasestorage.app",
            messagingSenderId: "916205408985",
            appId: "1:916205408985:web:1dd57fc8704c6c0e8fe4c8",
            measurementId: "G-TKTZB2FFRB"
        };
        firebase.initializeApp(firebaseConfig);
        
        const db = firebase.firestore();
        
        // Check if payouts page is enabled
        db.collection('payouts').doc('settings').get().then(doc => {
            if (!doc.exists || !doc.data().enabled) {
                // Redirect to index if page is disabled
                window.location.href = 'index.html';
                return;
            }
            
            // Load and display payouts
            db.collection('payouts').doc('data').get().then(dataDoc => {
                const loadingMsg = document.getElementById('loadingMessage');
                const table = document.getElementById('payoutsTable');
                const tbody = document.getElementById('payouts-body');
                
                if (!dataDoc.exists || !dataDoc.data().payouts || dataDoc.data().payouts.length === 0) {
                    loadingMsg.textContent = 'No payout information available yet.';
                    return;
                }
                
                const payouts = dataDoc.data().payouts;
                
                payouts.forEach(payout => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>${payout.place}</strong></td>
                        <td>${payout.winner}</td>
                        <td><strong style="color: #28a745;">$${payout.amount}</strong></td>
                        <td>${payout.notes || ''}</td>
                    `;
                    tbody.appendChild(tr);
                });
                
                loadingMsg.style.display = 'none';
                table.style.display = 'table';
            }).catch(err => {
                document.getElementById('loadingMessage').textContent = 'Error loading payouts.';
                console.error(err);
            });
        }).catch(err => {
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
